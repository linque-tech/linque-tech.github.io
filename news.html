  <script>
    function formatDate(dateStr) {
      var d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadNews() {
      var grid = document.getElementById('news-grid');
      try {
        var res = await fetch('posts.json');
        var posts = await res.json();
        if (!posts.length) {
          grid.innerHTML = '<div class="news-empty"><p class="paragraph">No news articles yet. Check back soon.</p></div>';
          return;
        }
        grid.innerHTML = posts.map(function(post) {
          return '<a href="news-post.html?post=' + encodeURIComponent(post.slug) + '" class="news-card">'
            + '<img class="news-card-image" src="' + post.image + '" alt="' + post.title + '" loading="lazy">'
            + '<div class="news-card-content">'
            + '<div class="news-card-date">' + formatDate(post.date) + '</div>'
            + '<div class="news-card-title">' + post.title + '</div>'
            + '<p class="news-card-excerpt">' + post.excerpt + '</p>'
            + '<span class="button news-read-more">Read more</span>'
            + '</div>'
            + '</a>';
        }).join('');
      } catch (e) {
        grid.innerHTML = '<div class="news-empty"><p class="paragraph">News articles coming soon.</p></div>';
      }
    }

    loadNews();
  </script>
